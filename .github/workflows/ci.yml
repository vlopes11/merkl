name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # no_std — no features
          - name: no features
            args: --no-default-features
          # no_std + sha2
          - name: sha2
            args: --no-default-features --features sha2
          # std (default)
          - name: std
            args: ""
          # std + sha2
          - name: std / sha2
            args: --features sha2
          # redb (implies std)
          - name: redb
            args: --features redb
          # redb + sha2
          - name: redb / sha2
            args: --features redb,sha2
          # fjall (implies std)
          - name: fjall
            args: --features fjall
          # fjall + sha2
          - name: fjall / sha2
            args: --features fjall,sha2
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy ${{ matrix.args }}

  bare-metal:
    name: Bare-metal (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # no_std — no features
          - name: no features
            args: --no-default-features
          # no_std + sha2 (sha2 crate is no_std-compatible)
          - name: sha2
            args: --no-default-features --features sha2
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7m-none-eabi
      - run: cargo check --target thumbv7m-none-eabi ${{ matrix.args }}

  test:
    name: Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # no_std — no features
          - name: no features
            args: --no-default-features
          # no_std + sha2
          - name: sha2
            args: --no-default-features --features sha2
          # std (default)
          - name: std
            args: ""
          # std + sha2
          - name: std / sha2
            args: --features sha2
          # redb (implies std)
          - name: redb
            args: --features redb
          # redb + sha2
          - name: redb / sha2
            args: --features redb,sha2
          # fjall (implies std)
          - name: fjall
            args: --features fjall
          # fjall + sha2
          - name: fjall / sha2
            args: --features fjall,sha2
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test ${{ matrix.args }}
